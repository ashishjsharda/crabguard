name: Publish to PyPI

on:
  push:
    tags:
      - "v*"           # Triggers on: git tag v1.0.0 && git push --tags

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # Required for Trusted Publishing (no API token needed!)

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build twine

      - name: Build distribution
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Uses PyPI Trusted Publishing — no PYPI_API_TOKEN secret needed
        # Set up at: https://pypi.org/manage/account/publishing/
